<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lope Style — Sartaroshingiz, bir bosishda">
  <meta name="theme-color" content="#0B0F1A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lope Style">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lope Style</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Match the app's dark theme so the browser never flashes a white
       page between the HTML shell and Flutter's first paint. */
    html, body {
      margin: 0;
      padding: 0;
      background: #0B0F1A;
      color: #E5E7EB;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      overscroll-behavior: none;
    }
    /* Dark-themed splash shown while main.dart.js downloads. Flutter's
       default blue LinearProgressIndicator is hidden — we replace it
       with a subtle 3-dot pulse that matches the SplashScreen widget. */
    #lope-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center,
                    rgba(59, 130, 246, 0.12) 0%,
                    #0B0F1A 70%);
      z-index: 999;
      transition: opacity 300ms ease;
    }
    #lope-splash.done {
      opacity: 0;
      pointer-events: none;
    }
    #lope-splash .logo {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      box-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
    }
    #lope-splash .brand {
      margin-top: 20px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #FFFFFF;
    }
    #lope-splash .dots {
      position: absolute;
      bottom: 48px;
      display: flex;
      gap: 6px;
    }
    #lope-splash .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3B82F6;
      animation: lope-bounce 900ms ease-in-out infinite;
    }
    #lope-splash .dots span:nth-child(2) { animation-delay: 150ms; }
    #lope-splash .dots span:nth-child(3) { animation-delay: 300ms; }
    @keyframes lope-bounce {
      0%, 100% { transform: scale(0.6); opacity: 0.4; }
      50%      { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="lope-splash">
    <div class="logo">✂</div>
    <div class="brand">Lope Style</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <script>
    // Hide the branded splash once Flutter's first frame renders. Flutter
    // dispatches a `flutter-first-frame` event on window when the engine
    // has painted the initial UI.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('lope-splash');
      if (!el) return;
      el.classList.add('done');
      setTimeout(function () { el.remove(); }, 320);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
