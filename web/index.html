<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lope Style — Sartaroshingiz, bir bosishda">
  <meta name="theme-color" content="#0B0F1A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lope Style">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lope Style</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Match the app's dark theme so the browser never flashes a white
       page between the HTML shell and Flutter's first paint. */
    html, body {
      margin: 0;
      padding: 0;
      background: #0B0F1A;
      color: #E5E7EB;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
                   Roboto, "Helvetica Neue", Arial, sans-serif;
      overscroll-behavior: none;
    }
    /* Dark-themed splash shown while main.dart.js downloads. Uses an
       inline SVG for the scissors so the icon renders regardless of the
       browser's emoji font support (the previous ✂ codepoint was
       invisible on some Chromium builds). */
    #lope-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center,
                    rgba(59, 130, 246, 0.14) 0%,
                    #0B0F1A 65%);
      z-index: 999;
      opacity: 1;
      transition: opacity 300ms ease;
    }
    #lope-splash.done {
      opacity: 0;
      pointer-events: none;
    }
    #lope-splash .logo {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: linear-gradient(135deg, #3B82F6, #6366F1);
      box-shadow: 0 0 60px rgba(59, 130, 246, 0.55),
                  0 8px 24px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: lope-scale-in 700ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #lope-splash .logo svg {
      width: 48px;
      height: 48px;
      fill: #FFFFFF;
    }
    #lope-splash .brand {
      margin-top: 22px;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.6px;
      color: #FFFFFF;
      animation: lope-fade-up 500ms ease-out 200ms both;
    }
    #lope-splash .tagline {
      margin-top: 6px;
      font-size: 15px;
      color: #9CA3AF;
      animation: lope-fade-up 500ms ease-out 350ms both;
    }
    #lope-splash .dots {
      position: absolute;
      bottom: 56px;
      display: flex;
      gap: 8px;
    }
    #lope-splash .dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #3B82F6;
      animation: lope-bounce 900ms ease-in-out infinite;
    }
    #lope-splash .dots span:nth-child(2) { animation-delay: 150ms; }
    #lope-splash .dots span:nth-child(3) { animation-delay: 300ms; }
    @keyframes lope-bounce {
      0%, 100% { transform: scale(0.6); opacity: 0.4; }
      50%      { transform: scale(1);   opacity: 1; }
    }
    @keyframes lope-scale-in {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes lope-fade-up {
      0%   { transform: translateY(8px); opacity: 0; }
      100% { transform: translateY(0);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="lope-splash">
    <div class="logo">
      <!-- Scissors icon — matches the Material `content_cut` symbol used
           inside the Flutter SplashScreen widget. Inline SVG avoids the
           emoji-font fallback problem. -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="6" cy="6" r="3"></circle>
        <circle cx="6" cy="18" r="3"></circle>
        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
        <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
        <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
      </svg>
    </div>
    <div class="brand">Lope Style</div>
    <div class="tagline">Sartaroshingiz — bir bosishda</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <script>
    // Guarantee the branded splash is visible for at least this many ms
    // so users always see the animation instead of an instant flash to
    // the app on fast connections.
    var LOPE_SPLASH_MIN_MS = 900;
    var lopeSplashShownAt = Date.now();
    var lopeSplashDone = false;

    function dismissLopeSplash() {
      if (lopeSplashDone) return;
      lopeSplashDone = true;
      var elapsed = Date.now() - lopeSplashShownAt;
      var wait = Math.max(0, LOPE_SPLASH_MIN_MS - elapsed);
      setTimeout(function () {
        var el = document.getElementById('lope-splash');
        if (!el) return;
        el.classList.add('done');
        setTimeout(function () { el.remove(); }, 320);
      }, wait);
    }
    window.addEventListener('flutter-first-frame', dismissLopeSplash);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
