name: lope_mobile
description: "Lope Style — sartaroshlik bron ilovasi (Flutter)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1                  # Inter / SF Pro alternatives
  flutter_svg: ^2.0.10                  # SVG assets
  cached_network_image: ^3.4.1          # avatars, gallery images
  shimmer: ^3.0.0                       # loading skeletons
  flutter_animate: ^4.5.0                # one-liner animations (fade, scale, slide)
  lottie: ^3.1.3                        # premium animations (splash, success states)
  fl_chart: ^0.69.2                     # bar / line / pie charts for stats screens
  record: ^5.2.0                        # mic recorder for voice booking
  path_provider: ^2.1.5                 # temp dir for the voice file

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2        # JWT token, secrets
  shared_preferences: ^2.3.3             # non-sensitive prefs (theme, lang)

  # Date / time / utility
  intl: ^0.20.0                         # i18n, date formatting
  uuid: ^4.5.1
  url_launcher: ^6.3.1                  # tel:, sms:, https: links

  # Platform integrations (added later as needed)
  image_picker: ^1.1.2                  # camera + gallery
  permission_handler: ^11.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5             # push notifications
  flutter_contacts: ^2.2.2
  geolocator: ^13.0.2                   # distance sort + map "near me"
  flutter_map: ^7.0.2                   # OpenStreetMap tiles, no API key
  latlong2: ^0.9.1                      # LatLng type for flutter_map

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.1.5
  json_serializable: ^6.8.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

# Pin record_linux to a version that implements the same platform-interface
# methods the rest of `record` expects. Without this, the old transitive
# 0.7.2 misses startStream / hasPermission's `request:` named arg and the
# build fails — even though we only target Android.
dependency_overrides:
  record_linux: ^2.1.0
  record_platform_interface: ^2.1.0
  record_windows: ^2.1.0
  record_web: ^2.1.0

flutter:
  uses-material-design: true
  generate: true                         # enables flutter_localizations gen-l10n

  assets:
    - assets/i18n/
